# OpenAI configuration
dev.langchain4j.cdi.plugin.chat-model.class=dev.langchain4j.model.openai.OpenAiChatModel
dev.langchain4j.cdi.plugin.chat-model.config.api-key=${OPENAI_API_KEY}
dev.langchain4j.cdi.plugin.chat-model.config.model-name=gpt-5

# Memory
dev.langchain4j.cdi.plugin.simple-memory.class=dev.langchain4j.memory.chat.MessageWindowChatMemory
dev.langchain4j.cdi.plugin.simple-memory.scope=jakarta.enterprise.context.RequestScoped
dev.langchain4j.cdi.plugin.simple-memory.config.maxMessages=10

# RAG
dev.langchain4j.cdi.plugin.doc-retriever.class=dev.langchain4j.rag.content.retriever.EmbeddingStoreContentRetriever
dev.langchain4j.cdi.plugin.doc-retriever.config.embeddingStore=lookup:@default
dev.langchain4j.cdi.plugin.doc-retriever.config.embeddingModel=lookup:@default
dev.langchain4j.cdi.plugin.doc-retriever.config.maxResults=5
dev.langchain4j.cdi.plugin.doc-retriever.config.minScore=0.6

# MCP
dev.langchain4j.cdi.plugin.ssetransport.class=dev.langchain4j.mcp.client.transport.http.HttpMcpTransport
dev.langchain4j.cdi.plugin.ssetransport.config.sseUrl=http://localhost:8090/sse
dev.langchain4j.cdi.plugin.ssetransport.config.logRequests=true
dev.langchain4j.cdi.plugin.ssetransport.config.logResponses=true

dev.langchain4j.cdi.plugin.mcpsse.class=dev.langchain4j.mcp.client.DefaultMcpClient
dev.langchain4j.cdi.plugin.mcpsse.config.transport=lookup:@ssetransport

dev.langchain4j.cdi.plugin.mcp.class=dev.langchain4j.mcp.McpToolProvider
dev.langchain4j.cdi.plugin.mcp.config.mcpClients=lookup:@mcpsse
